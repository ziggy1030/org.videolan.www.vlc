version: "3.0.21.12"

package:
  id: "org.videolan.www.vlc"
  name: "VLC"
  version: "3.0.21.12"
  kind: app
  description: |
    multimedia player and streamer
    VLC is the VideoLAN project's media player.
    It plays MPEG, MPEG-2, MPEG-4,
    DivX, MOV, WMV, QuickTime, WebM, FLAC, MP3,
    Ogg/Vorbis files, DVDs, VCDs,
    podcasts, and multimedia streams from various network sources.
    .
    VLC can also be used as a streaming server that duplicates
    the stream it reads and multicasts them through the
    network to other clients, or serves
    them through HTTP.
    .
    VLC has support for on-the-fly transcoding of audio and
    video formats, either for broadcasting purposes or
    for movie format transformations. Support for
    most output methods is provided by this package,
    but features can be added by
    installing additional plugins:
    * vlc-plugin-access-extra
    * vlc-plugin-fluidsynth
    * vlc-plugin-jack
    * vlc-plugin-notify
    * vlc-plugin-samba
    * vlc-plugin-skins2
    * vlc-plugin-svg
    * vlc-plugin-video-splitter
    * vlc-plugin-visualization


base: org.deepin.base/25.2.2

command:
  - "vlc.sh"

buildext:
  apt:
    build_depends:
      - vlc
    depends: # 运行时依赖，会包含在最终的应用或运行时中
      - vlc

build: |
  ##Extract res
  mkdir -p "/project/files/"
  cp -rf "/usr/share" "${PREFIX}/"
  rm -rf ${PREFIX}/share/applications/*
  cp -rf /project/files/* "${PREFIX}/"
  rm -rf "${PREFIX}/share/systemd" "${PREFIX}/share/perl"
